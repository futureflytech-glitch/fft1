kind = "web"
previewPath = "/"
title = "Future Fly Tech"
version = "1.0.0"
id = "artifacts/future-fly-tech"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19169

[services.development]
run = "pnpm --filter @workspace/future-fly-tech run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/future-fly-tech", "run", "build" ]
publicDir = "artifacts/future-fly-tech/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19169"
BASE_PATH = "/"
